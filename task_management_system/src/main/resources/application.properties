spring.application.name=task-management-system
#psql db configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/stms?useSSL=false
spring.datasource.username=postgres
spring.datasource.password=${PSQL_DB_PASSWORD}

#JPA configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

#Configure flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#Configure liquibase
spring.liquibase.enabled: true
spring.liquibase.change-log: classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=dev
spring.liquibase.default-schema=public


#email otp configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yeasin.arafat@gigatechltd.com
spring.mail.password=${GMAIL_APP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#Global Variables
base_url=http://localhost:8080/
task_url=http://localhost:8080/tasks/


#Configure Logging Format
logging.pattern.console=%d [%level] %c{2.} %m%n
